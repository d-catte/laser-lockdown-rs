<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Authentication Panel</title>

    <style>
        body {
            margin: 0;
            font-family: monospace;
            background-color: #111;
            color: #eee;
            overflow: hidden; /* prevents scroll bypass */
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #login-box {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #444;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            background: #333;
            color: white;
            border: 1px solid #555;
        }

        button:hover {
            background: #444;
            cursor: pointer;
        }

        /* DASHBOARD */
        #dashboard {
            display: flex;
            height: 100vh;
        }

        /* CONSOLE */
        #console-container {
            width: 50%;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #console {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            white-space: pre-wrap;
            background: #000;
            font-size: 13px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 15px #00ff8855;
            border-radius: 5px;
        }

        #console.empty::before {
            content: "No logs available...";
            color: #666;
        }

        /* USERS */
        #users-container {
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        #users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-entry input {
            width: 40%;
        }

        /* TOOLBAR */
        .toolbar {
            padding: 10px;
            border-top: 2px solid #333;
            background: #1a1a1a;
        }

        .toolbar button {
            margin-right: 10px;
        }

        /* PASSWORD CHANGE */
        #password-change {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
    <div id="login-box">
        <h2>Device Login</h2>
        <label for="password"></label><input type="password" id="password" placeholder="Enter password">
        <br>
        <button onclick="login()">Login</button>
        <div id="login-error" style="color:red;"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- CONSOLE -->
    <div id="console-container">
        <div id="console" class="empty"></div>
    </div>

    <!-- USERS -->
    <div id="users-container">
        <div id="users-list"></div>

        <div class="toolbar">
            <button onclick="enterAddMode()">Add Users</button>
            <button onclick="removeAllUsers()">Remove All</button>
            <button onclick="clearLogs()">Clear Logs</button>
            <button onclick="logout()">Logout</button>

            <div id="password-change">
                <h4>Change Password</h4>
                <label for="current-pass"></label><input type="password" id="current-pass" placeholder="Current password"><br>
                <label for="new-pass"></label><input type="password" id="new-pass" placeholder="New password"><br>
                <label for="confirm-pass"></label><input type="password" id="confirm-pass" placeholder="Confirm new password"><br>
                <button onclick="changePassword()">Update Password</button>
                <div id="pass-msg"></div>
            </div>
        </div>
    </div>

</div>

<script>

    /* ================= AUTH ================= */

    async function login() {
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("login-error");

        errorDiv.innerText = ""; // clear previous error

        try {
            const res = await fetch("/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ password })
            });

            if (res.status === 401) {
                errorDiv.innerText = "Incorrect password.";
                return;
            }

            if (!res.ok) {
                errorDiv.innerText = "Server error.";
                return;
            }

            // SUCCESS
            document.getElementById("login-screen").style.display = "none";
            document.body.style.overflow = "auto";
            startConsolePolling();
            await loadUsers();

        } catch (err) {
            errorDiv.innerText = "Login failed.";
        }
    }

    async function logout() {
        await fetch("/auth/logout", { method: "POST" });
        location.reload();
    }

    /* ================= CONSOLE ================= */

    function startConsolePolling() {
        setInterval(loadLogs, 10000);
    }

    async function loadLogs() {
        const res = await fetch("/logs/");

        if (!res.ok) {
            location.reload();
            return;
        }

        const text = await res.text();
        const consoleDiv = document.getElementById("console");

        consoleDiv.innerText = text;

        if (text.trim().length === 0) {
            consoleDiv.classList.add("empty");
        } else {
            consoleDiv.classList.remove("empty");
        }

        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    /* ================= USERS ================= */

    async function loadUsers() {
        const res = await fetch("/users/");
        if (!res.ok) {
            location.reload();
            return;
        }

        const users = await res.json();
        const list = document.getElementById("users-list");
        list.innerHTML = "";

        users.forEach(user => {
            const div = document.createElement("div");
            div.className = "user-entry";

            const nameInput = document.createElement("input");
            nameInput.value = user.name;
            nameInput.onblur = () => updateUser(user.id, nameInput.value);

            const idLabel = document.createElement("span");
            idLabel.innerText = user.id;

            const removeBtn = document.createElement("button");
            removeBtn.innerText = "X";
            removeBtn.onclick = () => removeUser(user.id);

            div.appendChild(nameInput);
            div.appendChild(idLabel);
            div.appendChild(removeBtn);

            list.appendChild(div);
        });
    }

    async function removeUser(id) {
        await fetch("/users/remove", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id })
        });
        await loadUsers();
    }

    async function updateUser(id, name) {
        await fetch("/users/update", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id, name })
        });
    }

    async function removeAllUsers() {
        await fetch("/users/clear", { method: "POST" });
        await loadUsers();
    }

    async function enterAddMode() {
        await fetch("/users/add", { method: "POST" });
    }

    async function clearLogs() {
        await fetch("/logs/clear", { method: "POST" });
        await loadLogs();
    }

    /* ================= PASSWORD CHANGE ================= */

    async function changePassword() {
        const current = document.getElementById("current-pass").value;
        const newPass = document.getElementById("new-pass").value;
        const confirm = document.getElementById("confirm-pass").value;

        if (newPass !== confirm) {
            document.getElementById("pass-msg").innerText = "Passwords do not match.";
            return;
        }

        const res = await fetch("/auth/change_password", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ current, new_password: newPass })
        });

        if (res.ok) {
            document.getElementById("pass-msg").innerText = "Password updated successfully.";
        } else {
            document.getElementById("pass-msg").innerText = "Failed to update password.";
        }
    }

</script>

</body>
</html>
